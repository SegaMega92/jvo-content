<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
{{{fontFaces}}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
  font-family: 'Roboto', 'Arial', sans-serif;
}

.canvas {
  position: relative;
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
  background: #fafafa;
  display: flex;
  flex-direction: column;
}

/* Top accent bar */
.accent-bar {
  width: 100%;
  height: 6px;
  background: {{accentColor}};
}

/* Header */
.header {
  padding: 40px 60px 20px;
  text-align: left;
}

.title-main {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-weight: 700;
  font-size: 52px;
  color: #1a1a1a;
  line-height: 1.15;
  letter-spacing: -0.01em;
}

.subtitle {
  font-family: 'Roboto', sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: #666;
  margin-top: 10px;
  letter-spacing: 0.05em;
}

.divider {
  width: 60px;
  height: 3px;
  background: {{accentColor}};
  margin-top: 20px;
}

/* Product image */
.product-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 60px;
  min-height: 0;
}

.product-image {
  max-width: 80%;
  max-height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 8px 30px rgba(0, 0, 0, 0.12));
}

.product-image-original {
  max-width: 75%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
}

/* Features grid */
.features-grid {
  padding: 30px 60px 50px;
  display: flex;
  gap: 20px;
}

.feature-item {
  flex: 1;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  border-left: 2px solid {{accentColor}};
}

.feature-icon {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  opacity: 0.7;
}

.feature-icon-placeholder {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: {{accentColor}};
  font-size: 16px;
  font-weight: bold;
}

.feature-text {
  font-family: 'Roboto', sans-serif;
  font-weight: 400;
  font-size: 14px;
  color: #444;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="accent-bar"></div>

  <!-- Header -->
  <div class="header">
    <div class="title-main">{{title}}</div>
    {{#if subtitle}}
    <div class="subtitle">{{subtitle}}</div>
    {{/if}}
    <div class="divider"></div>
  </div>

  <!-- Product -->
  <div class="product-section">
    {{#if cutoutBase64}}
    <img class="product-image" src="{{cutoutBase64}}" alt="Product">
    {{else}}
    <img class="product-image-original" src="{{originalBase64}}" alt="Product">
    {{/if}}
  </div>

  <!-- Features -->
  {{#if features.length}}
  <div class="features-grid">
    {{#each features}}
    <div class="feature-item">
      {{#if this.iconSrc}}
      <img class="feature-icon" src="{{this.iconSrc}}" alt="{{this.icon}}">
      {{else}}
      <div class="feature-icon-placeholder">→</div>
      {{/if}}
      <span class="feature-text">{{this.text}}</span>
    </div>
    {{/each}}
  </div>
  {{/if}}
</div>
</body>
</html>
