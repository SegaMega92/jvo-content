<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
{{{fontFaces}}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
  font-family: 'Montserrat', 'Arial', sans-serif;
}

.canvas {
  position: relative;
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
}

/* Layer 1: Background */
.layer-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    {{accentColor}} 0%,
    {{secondaryColor}} 50%,
    {{accentColor}} 100%
  );
  z-index: 1;
}

.bg-frame {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  z-index: 2;
}

.bg-frame-inner {
  position: absolute;
  top: 30px;
  left: 30px;
  right: 30px;
  bottom: 30px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 2;
}

/* Layer 2: Title text behind the model */
.layer-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  pointer-events: none;
}

.title-main {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: clamp(60px, 11vw, 130px);
  letter-spacing: 0.05em;
  line-height: 1.05;
  text-align: center;
  color: {{textColor}};
  opacity: 0.85;
  text-transform: uppercase;
  max-width: 95%;
  word-break: break-word;
  text-shadow:
    2px 2px 4px rgba(0, 0, 0, 0.1),
    0 0 40px rgba(0, 0, 0, 0.05);
}

/* Layer 3: Cutout model image on top */
.layer-model {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 4;
  pointer-events: none;
}

.model-image {
  max-width: 85%;
  max-height: 95%;
  object-fit: contain;
  object-position: bottom center;
  filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.15));
}

/* Fallback: no cutout, show original image */
.model-image-fallback {
  max-width: 80%;
  max-height: 90%;
  object-fit: contain;
  object-position: center;
  border-radius: 8px;
}

/* Subtitle badge */
.subtitle-badge {
  position: absolute;
  top: 50px;
  left: 50px;
  z-index: 10;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 4px;
  padding: 10px 22px;
  font-family: 'Roboto', sans-serif;
  font-weight: 500;
  font-size: 16px;
  color: {{textColor}};
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Features panel */
.features-panel {
  position: absolute;
  left: 50px;
  bottom: 80px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 280px;
}

.feature-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 6px;
  padding: 12px 18px;
}

.feature-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  filter: {{#if (eq textColor '#ffffff')}}brightness(10){{else}}brightness(0.2){{/if}};
}

.feature-icon-placeholder {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: {{textColor}};
}

.feature-text {
  font-family: 'Roboto', sans-serif;
  font-weight: 500;
  font-size: 15px;
  color: {{textColor}};
  line-height: 1.3;
}

/* Corner decoration */
.corner-decoration {
  position: absolute;
  width: 60px;
  height: 60px;
  z-index: 2;
}

.corner-decoration.top-right {
  top: 40px;
  right: 40px;
  border-top: 2px solid rgba(255, 255, 255, 0.3);
  border-right: 2px solid rgba(255, 255, 255, 0.3);
}

.corner-decoration.bottom-left {
  bottom: 40px;
  left: 40px;
  border-bottom: 2px solid rgba(255, 255, 255, 0.3);
  border-left: 2px solid rgba(255, 255, 255, 0.3);
}

.corner-decoration.bottom-right {
  bottom: 40px;
  right: 40px;
  border-bottom: 2px solid rgba(255, 255, 255, 0.3);
  border-right: 2px solid rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>
<div class="canvas">
  <!-- Layer 1: Background -->
  <div class="layer-bg"></div>
  <div class="bg-frame"></div>
  <div class="bg-frame-inner"></div>

  <!-- Corner decorations -->
  <div class="corner-decoration top-right"></div>
  <div class="corner-decoration bottom-left"></div>
  <div class="corner-decoration bottom-right"></div>

  <!-- Subtitle badge -->
  {{#if subtitle}}
  <div class="subtitle-badge">{{subtitle}}</div>
  {{/if}}

  <!-- Layer 2: Title text (behind model) -->
  <div class="layer-text">
    <div class="title-main">{{title}}</div>
  </div>

  <!-- Layer 3: Model cutout (in front of text) -->
  <div class="layer-model">
    {{#if cutoutBase64}}
    <img class="model-image" src="{{cutoutBase64}}" alt="Product">
    {{else}}
    <img class="model-image-fallback" src="{{originalBase64}}" alt="Product">
    {{/if}}
  </div>

  <!-- Features panel -->
  {{#if features.length}}
  <div class="features-panel">
    {{#each features}}
    <div class="feature-item">
      {{#if this.iconSrc}}
      <img class="feature-icon" src="{{this.iconSrc}}" alt="{{this.icon}}">
      {{else}}
      <div class="feature-icon-placeholder">•</div>
      {{/if}}
      <span class="feature-text">{{this.text}}</span>
    </div>
    {{/each}}
  </div>
  {{/if}}
</div>
</body>
</html>
