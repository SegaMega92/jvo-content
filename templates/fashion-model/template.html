<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
{{{fontFaces}}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
}

.canvas {
  position: relative;
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

/* z-index:
   1 — фон
   3 — контент (текст + полосы) — ЗА моделью
   4 — фото модели — НАД текстом
   5 — бейджи преимуществ — самый верх
*/

.bg {
  position: absolute;
  inset: 0;
  background: #f5eedb;
  z-index: 1;
}

/* Контентная колонка — flex column с gap 36px */
.content {
  position: absolute;
  left: 0;
  top: 73px;
  width: 840px;
  height: 1041px;
  display: flex;
  flex-direction: column;
  gap: 36px;
  align-items: flex-start;
  z-index: 3;
}

/* Каждая строка: полоса 24px + контент */
.row {
  display: flex;
  gap: 36px;
  align-items: center;
  flex-shrink: 0;
}

.row-full {
  display: flex;
  gap: 36px;
  align-items: center;
  flex-shrink: 0;
  width: 100%;
}

/* Полоска слева — self-stretch по высоте строки */
.stripe {
  width: 24px;
  flex-shrink: 0;
  align-self: stretch;
}

.stripe-accent {
  width: 24px;
  flex-shrink: 0;
  align-self: stretch;
  background: {{accentColor}};
}

/* Полоса-заполнитель внизу — flex:1 */
.stripe-fill {
  width: 24px;
  flex: 1 0 0;
  min-height: 1px;
  background: {{accentColor}};
}

/* Бейдж преимущества */
.advantage-badge {
  background: {{accentColor}};
  padding: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.advantage-badge span {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 30px;
  color: #000;
  letter-spacing: -1.2px;
  white-space: nowrap;
  line-height: 1;
  font-variation-settings: 'opsz' 9;
}

/* Заголовок */
.title-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 120px;
  line-height: 0.98;
  letter-spacing: -7.2px;
  text-transform: uppercase;
  color: #000201;
  width: 780px;
  flex-shrink: 0;
  font-variation-settings: 'opsz' 14;
}

/* Характеристики */
.features-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 299px;
  flex-shrink: 0;
}

.feature-item {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 26px;
  color: #000;
  letter-spacing: -1.04px;
  line-height: 1;
  font-variation-settings: 'opsz' 9;
}

/* Фото модели — НАД текстом */
.product-photo {
  position: absolute;
  left: 268px;
  top: 73px;
  width: 632px;
  height: 1124px;
  overflow: hidden;
  z-index: 4;
}

.product-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* Преимущество №2 — снизу справа, самый верх */
.advantage-bottom {
  position: absolute;
  right: 0;
  top: 1064px;
  z-index: 5;
}

.advantage-bottom .advantage-badge {
  padding: 10px 60px 10px 10px;
}
</style>
</head>
<body>
<div class="canvas">
  <!-- Фон -->
  <div class="bg"></div>

  <!-- Контент: полосы + текст (z-index 3, ЗА моделью) -->
  <div class="content">
    <!-- Строка 1: спейсер + Преимущество №1 -->
    {{#if advantage1}}
    <div class="row">
      <div class="stripe"></div>
      <div class="advantage-badge" style="z-index: 5; position: relative;">
        <span>{{advantage1}}</span>
      </div>
    </div>
    {{/if}}

    <!-- Строка 2: акцентная полоса + Заголовок -->
    <div class="row-full">
      <div class="stripe-accent"></div>
      <div class="title-text">{{title}}</div>
    </div>

    <!-- Строка 3: спейсер + Характеристики -->
    {{#if features.length}}
    <div class="row">
      <div class="stripe"></div>
      <div class="features-list">
        {{#each features}}
        <div class="feature-item">{{this.text}}</div>
        {{/each}}
      </div>
    </div>
    {{/if}}

    <!-- Полоса-заполнитель до конца -->
    <div class="stripe-fill"></div>
  </div>

  <!-- Фото модели (z-index 4, НАД текстом) -->
  <div class="product-photo">
    {{#if cutoutBase64}}
    <img src="{{cutoutBase64}}" alt="Product">
    {{else if originalBase64}}
    <img src="{{originalBase64}}" alt="Product">
    {{/if}}
  </div>

  <!-- Преимущество №2 (z-index 5, самый верх) -->
  {{#if advantage2}}
  <div class="advantage-bottom">
    <div class="advantage-badge">
      <span>{{advantage2}}</span>
    </div>
  </div>
  {{/if}}
</div>
</body>
</html>
