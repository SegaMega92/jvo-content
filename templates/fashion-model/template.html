<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
{{{fontFaces}}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
}

.canvas {
  position: relative;
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  background: {{accentColor}}22;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

/* Бежевый фон */
.bg {
  position: absolute;
  inset: 0;
  background: #f5eedb;
}

/* Вертикальная акцентная полоса слева */
.accent-bar {
  position: absolute;
  left: 0;
  top: 61px;
  bottom: 0;
  width: 24px;
  background: {{accentColor}};
}

/* Фото товара — правая часть */
.product-photo {
  position: absolute;
  right: 0;
  top: 61px;
  width: 526px;
  height: 936px;
  overflow: hidden;
}

.product-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Контентная область слева */
.content {
  position: absolute;
  left: 0;
  top: 61px;
  width: 700px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

/* Преимущество №1 — бейдж сверху */
.advantage-top {
  display: flex;
  align-items: center;
  gap: 30px;
  padding-left: 54px;
}

.advantage-badge {
  background: {{accentColor}};
  padding: 10px 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.advantage-badge span {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 25px;
  color: #000;
  letter-spacing: -1px;
  white-space: nowrap;
  line-height: 1;
}

/* Заголовок */
.title-block {
  display: flex;
  align-items: center;
  gap: 30px;
}

.title-bar {
  width: 24px;
  align-self: stretch;
  background: {{accentColor}};
  flex-shrink: 0;
}

.title-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 100px;
  line-height: 0.98;
  letter-spacing: -6px;
  text-transform: uppercase;
  color: #000201;
  width: 650px;
  word-break: break-word;
}

/* Характеристики */
.features-block {
  display: flex;
  align-items: flex-start;
  gap: 30px;
  padding-left: 54px;
}

.features-list {
  display: flex;
  flex-direction: column;
  gap: 13px;
}

.feature-item {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 22px;
  color: #000;
  letter-spacing: -0.88px;
  line-height: 1;
}

/* Нижняя часть акцентной полосы */
.accent-bar-bottom {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 24px;
  top: 61px;
  /* already covered by .accent-bar, this is just structural */
}

/* Преимущество №2 — бейдж снизу справа */
.advantage-bottom {
  position: absolute;
  right: 0;
  bottom: 68px;
}

.advantage-bottom .advantage-badge {
  padding: 10px 50px 10px 14px;
}
</style>
</head>
<body>
<div class="canvas">
  <!-- Фон -->
  <div class="bg"></div>

  <!-- Акцентная полоса слева -->
  <div class="accent-bar"></div>

  <!-- Фото товара справа -->
  <div class="product-photo">
    {{#if cutoutBase64}}
    <img src="{{cutoutBase64}}" alt="Product">
    {{else}}
    <img src="{{originalBase64}}" alt="Product">
    {{/if}}
  </div>

  <!-- Контент слева -->
  <div class="content">
    <!-- Преимущество №1 -->
    {{#if advantage1}}
    <div class="advantage-top">
      <div class="advantage-badge">
        <span>{{advantage1}}</span>
      </div>
    </div>
    {{/if}}

    <!-- Заголовок -->
    <div class="title-block">
      <div class="title-bar"></div>
      <div class="title-text">{{title}}</div>
    </div>

    <!-- Характеристики -->
    {{#if features.length}}
    <div class="features-block">
      <div class="features-list">
        {{#each features}}
        <div class="feature-item">{{this.text}}</div>
        {{/each}}
      </div>
    </div>
    {{/if}}
  </div>

  <!-- Преимущество №2 снизу справа -->
  {{#if advantage2}}
  <div class="advantage-bottom">
    <div class="advantage-badge">
      <span>{{advantage2}}</span>
    </div>
  </div>
  {{/if}}
</div>
</body>
</html>
