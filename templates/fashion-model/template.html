<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
{{{fontFaces}}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
}

.canvas {
  position: relative;
  width: {{outputWidth}}px;
  height: {{outputHeight}}px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
}

/* z-index слои:
   1 — фон
   2 — акцентная полоса
   3 — заголовок + характеристики (ЗА моделью)
   4 — фото модели (НАД текстом)
   5 — бейджи преимуществ (самый верх)
*/

/* Бежевый фон */
.bg {
  position: absolute;
  inset: 0;
  background: #f5eedb;
  z-index: 1;
}

/* Вертикальная акцентная полоса слева */
.accent-bar {
  position: absolute;
  left: 0;
  top: 73px;
  bottom: 0;
  width: 24px;
  background: {{accentColor}};
  z-index: 2;
}

/* Заголовок + характеристики — ЗА моделью */
.content {
  position: absolute;
  left: 0;
  top: 73px;
  width: 700px;
  display: flex;
  flex-direction: column;
  gap: 30px;
  z-index: 3;
}

.title-block {
  display: flex;
  align-items: center;
  gap: 30px;
}

.title-bar {
  width: 24px;
  align-self: stretch;
  background: {{accentColor}};
  flex-shrink: 0;
}

.title-text {
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 100px;
  line-height: 0.98;
  letter-spacing: -6px;
  text-transform: uppercase;
  color: #000201;
  width: 650px;
  word-break: break-word;
  font-variation-settings: 'opsz' 14;
}

.features-block {
  display: flex;
  align-items: flex-start;
  gap: 30px;
  padding-left: 54px;
}

.features-list {
  display: flex;
  flex-direction: column;
  gap: 13px;
}

.feature-item {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 22px;
  color: #000;
  letter-spacing: -0.88px;
  line-height: 1;
  font-variation-settings: 'opsz' 9;
}

/* Фото модели — НАД текстом */
.product-photo {
  position: absolute;
  left: 268px;
  top: 73px;
  width: 632px;
  height: 1124px;
  overflow: hidden;
  z-index: 4;
}

.product-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* Бейджи преимуществ — самый верх */
.advantage-top {
  position: absolute;
  left: 54px;
  top: 73px;
  z-index: 5;
}

.advantage-badge {
  background: {{accentColor}};
  padding: 10px 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.advantage-badge span {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 25px;
  color: #000;
  letter-spacing: -1px;
  white-space: nowrap;
  line-height: 1;
  font-variation-settings: 'opsz' 9;
}

.advantage-bottom {
  position: absolute;
  right: 0;
  bottom: 68px;
  z-index: 5;
}

.advantage-bottom .advantage-badge {
  padding: 10px 50px 10px 14px;
}
</style>
</head>
<body>
<div class="canvas">
  <!-- Layer 1: Фон -->
  <div class="bg"></div>

  <!-- Layer 2: Акцентная полоса -->
  <div class="accent-bar"></div>

  <!-- Layer 3: Заголовок + характеристики (ЗА моделью) -->
  <div class="content">
    {{#if advantage1}}
    <div style="height: 45px;"></div>
    {{/if}}
    <div class="title-block">
      <div class="title-bar"></div>
      <div class="title-text">{{title}}</div>
    </div>

    {{#if features.length}}
    <div class="features-block">
      <div class="features-list">
        {{#each features}}
        <div class="feature-item">{{this.text}}</div>
        {{/each}}
      </div>
    </div>
    {{/if}}
  </div>

  <!-- Layer 4: Фото модели (НАД текстом) -->
  <div class="product-photo">
    {{#if cutoutBase64}}
    <img src="{{cutoutBase64}}" alt="Product">
    {{else if originalBase64}}
    <img src="{{originalBase64}}" alt="Product">
    {{/if}}
  </div>

  <!-- Layer 5: Бейджи преимуществ (самый верх) -->
  {{#if advantage1}}
  <div class="advantage-top">
    <div class="advantage-badge">
      <span>{{advantage1}}</span>
    </div>
  </div>
  {{/if}}

  {{#if advantage2}}
  <div class="advantage-bottom">
    <div class="advantage-badge">
      <span>{{advantage2}}</span>
    </div>
  </div>
  {{/if}}
</div>
</body>
</html>
